<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена (404) | Доктор Дубенец-Попова</title>
  <meta name="description" content="Запрашиваемая страница не найдена.">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <script>
    // Если страница открывается из подпапки (на GitHub Pages),
    // нам нужно, чтобы пути для JS вычислялись от корня
    window.__is404 = true;
  </script>
</head>
<body>

  <div id="site-nav"></div>

  <!-- 404 Hero Section -->
  <section class="hero" style="background-image: url('assets/hero-bg-watercolor.png'); background-size: cover; background-position: center; min-height: 80vh; display: flex; align-items: center; text-align: center;">
    <div class="container">
      <div class="hero-text fade-in" style="max-width: 600px; margin: 0 auto; align-items: center;">
        <div class="hero-badge" style="margin: 0 auto 20px;">Ошибка 404</div>
        <h1 style="font-size: clamp(5rem, 15vw, 8rem); color: var(--gold); margin-bottom: 10px; line-height: 1;">404</h1>
        <h2 style="font-family: var(--font-heading); font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 20px; color: var(--text-primary);">Страница не найдена</h2>
        <p style="font-size: 1.1rem; margin-bottom: 40px; color: var(--text-secondary);">К сожалению, страница, которую вы ищете, не существует, была перемещена или временно недоступна.</p>
        <div class="hero-actions" style="justify-content: center;">
          <a href="./" class="btn-primary">На главную</a>
          <a href="services.html" class="btn-outline btn-hero-outline">Направления</a>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/main.js"></script>
</body>
</html>
